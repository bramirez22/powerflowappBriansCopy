name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint (if src exists)
        run: |
          if [ -d src ]; then ruff check src tests || exit 1; fi

      - name: Run tests (if tests exist)
        run: |
          if [ -d tests ] && [ "$(ls -A tests)" ]; then pytest -q; else echo "No tests yet"; fi
